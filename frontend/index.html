<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudLinks URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="app-shell">
      <nav class="top-nav">
        <a class="ghost-link" href="admin-login.html">Admin Login</a>
      </nav>
      <section class="hero">
        <p class="eyebrow">AWS Serverless Project</p>
        <h1>CloudLinks</h1>
        <p class="subtitle">Generate branded short links in seconds with a modern cloud-native workflow.</p>
      </section>

      <section class="workspace">
        <form id="shorten-form" class="shorten-form">
          <label for="url-input">Destination URL</label>
          <div class="input-row">
            <input
              id="url-input"
              type="url"
              placeholder="https://example.com/blog/post"
              required
            />
            <button id="submit-button" type="submit">
              <span class="btn-text">Create Link</span>
            </button>
          </div>
        </form>

        <section id="result" class="result hidden" aria-live="polite">
          <p class="result-label">Ready to share</p>
          <a id="short-url" href="#" target="_blank" rel="noopener noreferrer"></a>
          <button id="copy-button" type="button">Copy URL</button>
        </section>

        <p id="message" class="message" aria-live="polite"></p>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
