<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudLinks Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="bg-aurora" aria-hidden="true"></div>
    <main class="dashboard">
      <header class="header">
        <div>
          <p class="eyebrow">CloudLinks Admin</p>
          <h1>Analytics Dashboard</h1>
          <p class="subtitle">Live metrics for click performance and top short links.</p>
        </div>
        <div class="header-actions">
          <button id="refresh-button" type="button">Refresh Data</button>
          <button id="logout-button" type="button">Logout</button>
          <a href="index.html">Open Link Creator</a>
        </div>
      </header>

      <section class="kpi-grid">
        <article class="glass kpi">
          <p>Total Clicks</p>
          <h2 id="total-clicks">0</h2>
        </article>
        <article class="glass kpi">
          <p>Total Links</p>
          <h2 id="total-links">0</h2>
        </article>
      </section>

      <section class="chart-grid">
        <article class="glass panel">
          <h3>Top 5 Link Click Share</h3>
          <canvas id="click-share-chart"></canvas>
        </article>
        <article class="glass panel">
          <h3>Top 10 Links by Clicks</h3>
          <canvas id="top-links-chart"></canvas>
        </article>
      </section>

      <section class="glass table-panel">
        <div class="table-header">
          <h3>Top Links</h3>
          <span id="updated-at">Last updated: --</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Short Code</th>
                <th>Original URL</th>
                <th>Clicks</th>
              </tr>
            </thead>
            <tbody id="top-links-table"></tbody>
          </table>
        </div>
      </section>

      <p id="status-message" class="status" aria-live="polite"></p>
      <p id="session-info" class="session-info"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
