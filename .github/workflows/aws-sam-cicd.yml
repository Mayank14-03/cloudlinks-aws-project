name: AWS SAM CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: "ap-south-1"
  STACK_NAME: "cloudlinks-prod"

jobs:
  validate:
    name: Validate and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: SAM validate
        run: sam validate --template-file template.yaml --region $AWS_REGION

      - name: SAM build
        run: sam build --template-file template.yaml --use-container --region $AWS_REGION

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM deploy
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Resolve stack outputs
        id: stack_outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --region $AWS_REGION --query "Stacks[0].Outputs[?OutputKey=='CloudLinksApiUrl'].OutputValue" --output text)
          COGNITO_DOMAIN=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --region $AWS_REGION --query "Stacks[0].Outputs[?OutputKey=='CognitoHostedUiDomain'].OutputValue" --output text)
          COGNITO_CLIENT_ID=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --region $AWS_REGION --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolClientId'].OutputValue" --output text)
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --region $AWS_REGION --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          FRONTEND_DISTRIBUTION_ID=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --region $AWS_REGION --query "Stacks[0].Outputs[?OutputKey=='FrontendCloudFrontDistributionId'].OutputValue" --output text)

          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "cognito_domain=$COGNITO_DOMAIN" >> $GITHUB_OUTPUT
          echo "cognito_client_id=$COGNITO_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "frontend_distribution_id=$FRONTEND_DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Build frontend runtime config
        run: |
          cat > frontend/config.js <<EOF
          window.APP_CONFIG = {
            API_BASE_URL: "${{ steps.stack_outputs.outputs.api_url }}",
            COGNITO_DOMAIN: "${{ steps.stack_outputs.outputs.cognito_domain }}",
            COGNITO_CLIENT_ID: "${{ steps.stack_outputs.outputs.cognito_client_id }}",
            COGNITO_REDIRECT_URI: "http://localhost:5500/frontend/admin.html",
            COGNITO_LOGOUT_URI: "http://localhost:5500/frontend/admin-login.html",
            ADMIN_SESSION_IDLE_MINUTES: 30
          };
          EOF

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/ s3://${{ steps.stack_outputs.outputs.frontend_bucket }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack_outputs.outputs.frontend_distribution_id }} \
            --paths "/*"
